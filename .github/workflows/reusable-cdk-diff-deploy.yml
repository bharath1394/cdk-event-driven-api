name: Reusable CDK Diff & Deploy Workflow

on:
  workflow_call:
    inputs:
      pr_number:
        description: Pull request number to diff/deploy from
        required: true
        type: string

permissions:
  contents: read
  issues: write
  pull-requests: read

concurrency:
  group: cdk-diff-deploy-pr-${{ inputs.pr_number }}
  cancel-in-progress: false

jobs:
  cdk-diff:
    name: CDK Diff & Verification
    runs-on: ubuntu-latest
    outputs:
      head_sha: ${{ steps.pr-info.outputs.head_sha }}
      head_repo: ${{ steps.pr-info.outputs.head_repo }}

    steps:
      - name: Resolve PR head
        id: pr-info
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = Number('${{ inputs.pr_number }}');
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });

            const currentRepo = `${context.repo.owner}/${context.repo.repo}`;
            if (pr.head.repo.full_name !== currentRepo) {
              core.setFailed(
                `Security policy: refusing to run on fork PRs. Head repo ${pr.head.repo.full_name} is not ${currentRepo}.`
              );
              return;
            }

            core.setOutput('head_sha', pr.head.sha);
            core.setOutput('head_repo', pr.head.repo.full_name);

      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.pr-info.outputs.head_repo }}
          ref: ${{ steps.pr-info.outputs.head_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies (root)
        run: cd infra && npm install

      - name: Build Lambda functions
        run: |
          cd infra
          ./build.sh --no-deploy

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: CDK Synth (validate template)
        run: |
          cd infra
          npx cdk synth

      - name: CDK Diff
        run: |
          cd infra
          npx cdk diff > /tmp/cdk-diff.txt 2>&1 || true
          cat /tmp/cdk-diff.txt

      - name: Save Diff Output
        uses: actions/upload-artifact@v4
        with:
          name: cdk-diff-output
          path: /tmp/cdk-diff.txt

      - name: Comment PR with Diff
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const diff = fs.readFileSync('/tmp/cdk-diff.txt', 'utf8');
            github.rest.issues.createComment({
              issue_number: Number('${{ inputs.pr_number }}'),
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## CDK Diff Output\n\n\`\`\`\n${diff}\n\`\`\``
            });

  cdk-deploy:
    name: CDK Deploy
    needs: cdk-diff
    runs-on: ubuntu-latest
    environment:
      name: approval
      url: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          repository: ${{ needs.cdk-diff.outputs.head_repo }}
          ref: ${{ needs.cdk-diff.outputs.head_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies (root)
        run: cd infra && npm install

      - name: Build Lambda functions
        run: |
          cd infra
          ./build.sh --no-deploy

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: CDK Synth
        run: |
          cd infra
          npx cdk synth

      - name: CDK Deploy
        run: |
          cd infra
          npx cdk deploy --require-approval never

      - name: Deployment Success
        run: echo "✅ Deployment completed successfully!"
