name: CDK Diff & Deploy

on:
  issue_comment:
    types: [created, edited]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to run diff against'
        required: false
        type: string

permissions:
  contents: read
  pull-requests: write

jobs:
  diff-deploy:
    name: 
    uses: ./.github/workflows/reusable-cdk-diff-deploy.yml