name: CDK Diff & Deploy

on:
  issue_comment:
    types: [created, edited]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  diff-deploy-from-comment:
    if: github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '/run:cdk') && !contains(github.event.comment.body, '/run:cdk,destroy')
    uses: ./.github/workflows/reusable-cdk-diff-deploy.yml
    with:
      pr_number: ${{ github.event.issue.number }}
    secrets: inherit
