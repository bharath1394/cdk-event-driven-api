name: PR Validation

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  cdk-synth:
    name: cdk-synth
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect infra directory
        id: detect-infra
        run: |
          if [ -d infra ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        if: steps.detect-infra.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        if: steps.detect-infra.outputs.exists == 'true'
        run: |
          cd infra
          npm ci

      - name: CDK synth
        if: steps.detect-infra.outputs.exists == 'true'
        run: |
          cd infra
          npx cdk synth --no-lookups

      - name: Skip (no infra directory)
        if: steps.detect-infra.outputs.exists != 'true'
        run: echo "Skipping cdk-synth: infra/ not found in this PR."

  build-lambdas:
    name: build-lambdas
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect infra directory
        id: detect-infra
        run: |
          if [ -d infra ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        if: steps.detect-infra.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        if: steps.detect-infra.outputs.exists == 'true'
        run: |
          cd infra
          npm ci

      - name: Build Lambda functions
        if: steps.detect-infra.outputs.exists == 'true'
        run: |
          cd infra
          ./build.sh --no-deploy

      - name: Skip (no infra directory)
        if: steps.detect-infra.outputs.exists != 'true'
        run: echo "Skipping build-lambdas: infra/ not found in this PR."

  tests:
    name: tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect infra directory
        id: detect-infra
        run: |
          if [ -d infra ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        if: steps.detect-infra.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        if: steps.detect-infra.outputs.exists == 'true'
        run: |
          cd infra
          npm ci

      - name: Run tests (if configured)
        if: steps.detect-infra.outputs.exists == 'true'
        run: |
          cd infra
          if npm run | grep -qE '^[[:space:]]+test'; then
            npm test -- --ci
          else
            echo "No test script found; passing."
          fi

      - name: Skip (no infra directory)
        if: steps.detect-infra.outputs.exists != 'true'
        run: echo "Skipping tests: infra/ not found in this PR."

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect infra directory
        id: detect-infra
        run: |
          if [ -d infra ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        if: steps.detect-infra.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        if: steps.detect-infra.outputs.exists == 'true'
        run: |
          cd infra
          npm ci

      - name: Run lint (if configured)
        if: steps.detect-infra.outputs.exists == 'true'
        run: |
          cd infra
          if npm run | grep -qE '^[[:space:]]+lint'; then
            npm run lint
          else
            echo "No lint script found; passing."
          fi

      - name: Skip (no infra directory)
        if: steps.detect-infra.outputs.exists != 'true'
        run: echo "Skipping lint: infra/ not found in this PR."
