name: CDK Destroy

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: read

jobs:
  destroy-from-comment:
    if: github.event_name == 'issue_comment' && github.event.issue.pull_request && startsWith(github.event.comment.body, '/run:cdk,destroy') && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
    uses: ./.github/workflows/reusable-cdk-destroy.yml
    with:
      pr_number: ${{ github.event.issue.number }}
    secrets: inherit
