name: CDK Destroy

on:
  issue_comment:
    types: [created, edited]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  destroy-from-comment:
    if: github.event_name == 'issue_comment' && github.event.issue.pull_request && startsWith(github.event.comment.body, '/run:cdk,destroy')
    uses: ./.github/workflows/reusable-cdk-destroy.yml
    with:
      pr_number: ${{ github.event.issue.number }}
    secrets: inherit
